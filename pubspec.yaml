name: luck_builder
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  google_fonts: ^6.1.0
  gpt_markdown: ^1.1.5
  cupertino_icons: ^1.0.2
  sqflite: ^2.3.0
  path_provider: ^2.1.5
  path: ^1.8.3
  flutter_image_compress: ^2.4.0
  intl: ^0.19.0
  photo_view: ^0.15.0
  image_picker: ^1.2.1
  flutter_animate: ^4.5.2
  image: ^4.1.3
  dio: ^5.9.0
  flutter_dotenv: ^5.1.0
  google_generative_ai: ^0.4.7
  pdf: ^3.10.0
  printing: ^5.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - .env
  fonts:
    - family: NotoSansTC
      fonts:
        - asset: assets/fonts/NotoSansTC-Variable.ttf
    - family: NotoSansMath
      fonts:
        - asset: assets/fonts/NotoSansMath-Regular.ttf
    - family: NotoSansSymbols2
      fonts:
        - asset: assets/fonts/NotoSansSymbols2-Regular.ttf
