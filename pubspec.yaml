name: lucklab
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  google_fonts: ^6.1.0
  gpt_markdown: ^1.1.5
  flutter_math_fork: ^0.7.4
  cupertino_icons: ^1.0.2
  sqflite: ^2.3.0
  path_provider: ^2.1.5
  path: ^1.8.3
  flutter_image_compress: ^2.4.0
  intl: ^0.19.0
  photo_view: ^0.15.0
  image_picker: ^1.2.1
  flutter_animate: ^4.5.2
  image: ^4.1.3
  dio: ^5.9.0
  flutter_dotenv: ^5.1.0
  google_generative_ai: ^0.4.7
  pdf: ^3.10.0
  printing: ^5.11.0
  shared_preferences: ^2.5.4
  share_plus: ^12.0.1
  app_links: ^7.0.0
  glance_widget: ^1.0.1
  package_info_plus: ^9.0.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  url_launcher: ^6.3.2
  purchases_flutter: ^9.15.1
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/hi.png
    - assets/note.png
    - assets/home.png
    - "assets/learning tools.png"
    - assets/lucky.png
    - assets/sub.png
    - assets/camera.png
    - assets/data/banner_catalog.json
  fonts:
    - family: NotoSansTC
      fonts:
        - asset: assets/fonts/NotoSansTC-Variable.ttf
    - family: NotoSansMath
      fonts:
        - asset: assets/fonts/NotoSansMath-Regular.ttf
    - family: NotoSansSymbols2
      fonts:
        - asset: assets/fonts/NotoSansSymbols2-Regular.ttf
